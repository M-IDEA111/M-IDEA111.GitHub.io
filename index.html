  <style>
    /* تهيئة وتصفير الهوامش لضمان مطابقة التموج */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        padding-top: 70px !important;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #000000 !important;
        overflow-x: hidden;
        position: relative;
        gap: 15px;
    }

    /* حاوية التموج الانسيابي المطابق للصورة تماماً باستخدام SVG */
    .wave-container {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        line-height: 0;
        z-index: 1;
        pointer-events: none;
    }

    .wave-container svg {
        position: relative;
        display: block;
        width: 100%;
        height: 25vh;
    }

    /* الخلفية الهندسية العائمة الجديدة - مستقلة تماماً وخفيفة */
    .geometric-background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 2;
        overflow: hidden;
    }

    /* الأشكال الهندسية العائمة التفاعلية الجديدة */
    .floating-shape {
        position: absolute;
        opacity: 0.12;
        animation: floatShape 25s infinite linear;
        transform-origin: center;
    }

    @keyframes floatShape {
        0% {
            transform: translateY(110vh) rotate(0deg) scale(0.8);
        }
        50% {
            opacity: 0.25;
        }
        100% {
            transform: translateY(-15vh) rotate(360deg) scale(1.2);
            opacity: 0;
        }
    }

    /* هيدر الموقع بدون خطوط فاصلة وبدون استدعاء خارجي */
    header {
        padding: 0.5rem 2rem;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 70px;
        background: transparent !important;
        border-bottom: none !important;
        backdrop-filter: blur(10px);
    }

    .header-left {
        flex: 1;
        display: flex;
        justify-content: flex-start;
        align-items: center;
    }

    .logo-img {
        height: 80px !important;
        margin-top: 0;
        pointer-events: none;
    }

    .header-center {
        display: none;
    }

    .header-right {
        flex: 1;
        display: flex;
        justify-content: flex-end;
        align-items: center;
    }

    /* زر البدء Start بخلفية شفافة تماماً وإطار أحمر - بدون تحريك */

        background: transparent !important;
        border: 2px solid #b61412 !important;
        color: #b61412 !important;
        font-size: 0.9rem;
        padding: 6px 18px;
        border-radius: 30px;
        cursor: pointer;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        transition: none !important;
    }

    .start-nav-btn:hover {
        background: rgba(182, 20, 18, 0.1) !important;
        transform: none !important;
    }

    /* الحاوية الرئيسية للمحتوى */
    .creative-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex: none;
        width: 100%;
        max-width: 90%;
        padding: 1rem 1rem 0 1rem;
        z-index: 10;
        text-align: center;
        margin: 0 auto;
    }

    /* دمج الشعار و404 */
    .brand-creative-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        margin-bottom: 1rem;
        flex-wrap: wrap;

    .logo-b-img {

        width: auto;
    }

    .logo-404-text {
        font-size: clamp(4rem, 8vw, 7rem);
        font-weight: 800;
        color: #b61412 !important;
        line-height: 1;
        font-family: 'Arial Black', Gadget, sans-serif;
        letter-spacing: -2px;

    /* تطبيق خط راقٍ وجذاب وعصري للغاية لجملة الصيانة */
    .maintenance-title {
        font-family: 'Montserrat', sans-serif;
        font-size: clamp(1.3rem, 3.5vw, 2rem);

<script>

  document.addEventListener('DOMContentLoaded', function() {
      setupGeometricBackground();
  });

  function setupGeometricBackground() {
      const bgContainer = document.getElementById('geometric-background');
      if (!bgContainer) return;

      const shapes = ['square', 'triangle', 'circle'];
      const totalShapesCount = 18;

      for (let i = 0; i < totalShapesCount; i++) {
          const shape = document.createElement('div');
          const shapeType = shapes[Math.floor(Math.random() * shapes.length)];
          shape.className = `floating-shape ${shapeType}`;
          
          const size = Math.floor(Math.random() * 25) + 12;
          shape.style.width = `${size}px`;
          shape.style.height = `${size}px`;
          
          if (shapeType === 'triangle') {
              shape.style.borderLeft = `${size / 2}px solid transparent`;
              shape.style.borderRight = `${size / 2}px solid transparent`;
              shape.style.borderBottom = `${sizepx solid rgba(255, 255, 255, 0.04)`;
              shape.style.width = '0';
              shape.style.height = '0';
          } else if (shapeType === 'circle') {
              shape.style.borderRadius = '50%';
              shape.style.backgroundColor = 'rgba(255, 255, 255, 0.04)';
          } else {
              shape.style.borderRadius = '6px';
              shape.style.backgroundColor = 'rgba(255, 255, 255, 0.04)';
          }

          const randomLeft = Math.random() * 100;
          shape.style.left = `${randomLeft}vw`;
          shape.style.animationDelay = `${Math.random() * 15}s`;
          shape.style.animationDuration = `${Math.random() * 15 + 15}s`;

          bgContainer.appendChild(shape);
      }
  }
